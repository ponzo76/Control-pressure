<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Archivio Consapevolezza</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0b; --card: #181818; --accent: #1DB954; --text: #ececec; --sub: #a0a0a0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 100px; }
        
        /* Modal per Testi */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal-content { max-width: 800px; margin: 40px auto; }
        .close-btn { position: sticky; top: 0; float: right; font-size: 2rem; color: var(--accent); cursor: pointer; background: none; border: none; }
        
        .track-list { list-style: none; padding: 0; margin-top: 20px; }
        .track-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; color: var(--accent); font-weight: 600; }
        
        .lyrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .lyrics-col { font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; color: #ccc; }
        .lyrics-col h4 { color: var(--accent); border-bottom: 1px solid #444; padding-bottom: 5px; }

        /* Stile Card */
        .album-card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 20px; border: 1px solid #222; }
        .album-header { display: flex; gap: 15px; align-items: center; }
        .cover { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; }
        .info { flex: 1; }
        .actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: 700; font-size: 0.75rem; cursor: pointer; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-play { background: var(--accent); color: #000; }
        .btn-lyrics { background: #ffff64; color: #000; }
        .btn-check { background: #333; color: #fff; }
        
        .notes-box { width: 100%; background: #222; border: 1px solid #333; color: #ddd; padding: 12px; border-radius: 10px; margin: 12px 0; font-family: inherit; font-size: 0.9rem; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: var(--accent);">🎧 Archivio</h1>

    <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
        <button class="btn btn-check" onclick="exportData()">📤 BACKUP</button>
        <button class="btn btn-check" onclick="document.getElementById('importFile').click()">📥 IMPORTA</button>
        <input type="file" id="importFile" class="hidden" onchange="importData(event)">
    </div>

    <div id="list"></div>

    <div id="lyricsModal" class="modal">
        <button class="close-btn" onclick="closeModal()">×</button>
        <div id="modalBody" class="modal-content"></div>
    </div>

<script>
// Struttura dati aggiornata: ogni album ora può avere una lista di tracce
const initialAlbums = [
    { 
        title: "OK Computer", 
        artist: "Radiohead", 
        cover: "https://m.media-amazon.com/images/I/816mE-yNdtL._AC_SL1400_.jpg",
        tracks: [
            { name: "Airbag", original: "In the next world war...", translated: "Nella prossima guerra mondiale..." },
            { name: "Paranoid Android", original: "Please could you stop the noise...", translated: "Per favore, potresti smetterla con questo rumore..." }
        ]
    }
];

let myData = JSON.parse(localStorage.getItem('myMusicData')) || initialAlbums;

function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';
    myData.forEach((album, index) => {
        list.innerHTML += `
            <div class="album-card">
                <div class="album-header">
                    <img src="${album.cover || 'https://via.placeholder.com/80'}" class="cover">
                    <div class="info">
                        <div style="font-weight:700">${album.title}</div>
                        <div style="color:var(--sub); font-size:0.8rem">${album.artist}</div>
                    </div>
                </div>
                <textarea class="notes-box" placeholder="Riflessioni..." oninput="updateNote(${index}, this.value)">${album.note || ''}</textarea>
                <div class="actions">
                    <a href="spotify:search:${encodeURIComponent(album.artist + ' ' + album.title)}" class="btn btn-play">PLAY</a>
                    <button class="btn btn-lyrics" onclick="openLyrics(${index})">TESTI</button>
                    <button class="btn btn-check" onclick="toggle(${index})">${album.done ? '✓' : '...'}</button>
                </div>
            </div>
        `;
    });
}

function openLyrics(albumIndex) {
    const album = myData[albumIndex];
    const modal = document.getElementById('lyricsModal');
    const body = document.getElementById('modalBody');
    modal.style.display = 'block';
    
    let html = `<h2>${album.title} - Tracklist</h2><ul class="track-list">`;
    if(!album.tracks || album.tracks.length === 0) {
        html += `<p>Nessun testo aggiunto. <button onclick="addTrack(${albumIndex})">Aggiungi traccia</button></p>`;
    } else {
        album.tracks.forEach((track, tIndex) => {
            html += `<li class="track-item" onclick="showTrackLyrics(${albumIndex}, ${tIndex})">${tIndex + 1}. ${track.name}</li>`;
        });
        html += `<button style="margin-top:20px" class="btn btn-check" onclick="addTrack(${albumIndex})">+ Aggiungi Traccia</button>`;
    }
    html += `</ul>`;
    body.innerHTML = html;
}

function showTrackLyrics(aIdx, tIdx) {
    const track = myData[aIdx].tracks[tIdx];
    const body = document.getElementById('modalBody');
    body.innerHTML = `
        <button class="btn btn-check" onclick="openLyrics(${aIdx})">← Torna alla lista</button>
        <h3>${track.name}</h3>
        <div class="lyrics-grid">
            <div class="lyrics-col"><h4>Originale</h4>${track.original}</div>
            <div class="lyrics-col"><h4>Italiano</h4>${track.translated}</div>
        </div>
    `;
}

function addTrack(albumIndex) {
    const name = prompt("Titolo della canzone:");
    const original = prompt("Incolla il testo originale:");
    const translated = prompt("Incolla la traduzione:");
    if(name) {
        if(!myData[albumIndex].tracks) myData[albumIndex].tracks = [];
        myData[albumIndex].tracks.push({ name, original, translated });
        save(); openLyrics(albumIndex);
    }
}

function closeModal() { document.getElementById('lyricsModal').style.display = 'none'; }
function updateNote(i, v) { myData[i].note = v; save(); }
function save() { localStorage.setItem('myMusicData', JSON.stringify(myData)); }
function toggle(i) { myData[i].done = !myData[i].done; save(); render(); }

function exportData() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(myData));
    const a = document.createElement('a'); a.setAttribute("href", dataStr); a.setAttribute("download", "archivio_completo.json"); a.click();
}

function importData(event) {
    const reader = new FileReader();
    reader.onload = (e) => { myData = JSON.parse(e.target.result); save(); render(); };
    reader.readAsText(event.target.files[0]);
}

render();
</script>
</body>
</html>
